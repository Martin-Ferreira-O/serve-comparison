app = "serve-comparison"

[build]

[env]
  COMPARISON_SQLITE_PATH = "/data/comparison.sqlite3"
  COMPARISON_INVITES_PATH = "/data/comparison_claim_invites.json"

[[mounts]]
  source = "comparison_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "5s"
