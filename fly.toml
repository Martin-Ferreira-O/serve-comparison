# fly.toml app configuration file generated for serve-comparison on 2026-04-11T23:18:23-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'serve-comparison'
primary_region = 'dfw'

[build]

[env]
  COMPARISON_INVITES_PATH = 'data/comparison_claim_invites.json'
  # DATABASE_URL must be set as a secret: fly secrets set DATABASE_URL="postgresql://..."

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
